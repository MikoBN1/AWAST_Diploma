version: "3.8"

services:
  test-victim:
    build:
      context: ./test_victim
      dockerfile: Dockerfile
    container_name: test-victim
    ports:
      - "9999:9999"
    restart: unless-stopped

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: zap
    ports:
      - "8080:8080"
    volumes:
      - ./zap_wrk:/zap/wrk:rw
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4g
    command: >
      zap.sh -daemon 
      -host 0.0.0.0 
      -port 8080 
      -config api.addrs.addr.name=.* -config api.addrs.addr.regex=true 
      -config api.key=changeme
    depends_on:
      - test-victim

  xsstrike:
    build:
      context: ./xss_strike
      dockerfile: Dockerfile
    container_name: xsstrike
    ports:
      - "5001:5000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1g

  sqlmap:
    build:
      context: ./sqlmap
      dockerfile: Dockerfile
    container_name: sqlmap
    ports:
      - "8775:8775"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1g